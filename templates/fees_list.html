{% extends "base.html" %}

{% block content %}

<style>
table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th{
text-transform:uppercase;
letter-spacing:0.5px;
font-size:14px;
}

th, td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f2f2f2;
}
</style>

<h2 style="text-align:center; margin-bottom:20px;">Fees Records</h2>

<table>
    <tr style="background:#2c7be5; color:white;">
        <th>ID</th>
        <th>Student Name</th>
        <th>Amount</th>
        <th>Date</th>
   </tr>

{% for record in records %}

    <tr>
        <td>{{ record["id"] }}</td>
        <td>{{ record["name"] }}</td>
        <td>{{ record["amount"] }}</td>
        <td>{{ record["date"] }}</td>
    </tr>

{% endfor %}
</table>

<div style="text-align:center; margin:20px; display:flex; justify-content:center; gap:10px;">

    <a href="/fees"
    style="padding:8px 15px; background:#2c7be5; color:white; text-decoration:none; border-radius:5px;">
    Add Fees
    </a>

    <a href="/dashboard"
    style="padding:8px 15px; background:#28a745; color:white; text-decoration:none; border-radius:5px;">
    Back to Dashboard
    </a>

</div>

{% endblock %}
