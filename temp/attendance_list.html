<!DOCTYPE html>
<html>
<head>
<title>Attendance Records</title>

<style>

table{
width:90%;
margin:auto;
border-collapse:collapse;
}

th, td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#2c7be5;
color:white;
}

</style>

</head>

<body>

<h2 style="text-align:center;">Attendance Records</h2>

<table>

<tr>
<th>ID</th>
<th>Student Name</th>
<th>Date</th>
<th>Status</th>
</tr>

{% for row in records %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
