<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vidyashree Public School</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
            padding-top:100px;
        }
        .login-box{
            background:white;
            width:350px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        input{
            width:90%;
            padding:10px;
            margin:10px;
        }
        button{
            padding:10px 20px;
            background:#2c7be5;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Welcome to Vidyashree Public School</h2>
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
            <a href="/forgot_password">Forgot Password?</a>
        </form>
    </div>
</body>
</html>
