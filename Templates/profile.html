{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center; margin-bottom:20px;">Change Password</h2>

{% if error %}
<p style="color:red; text-align:center;">{{ error }}</p>
{% endif %}

<form method="POST" style="width:300px; margin:20px auto;">
    
    <label>Old Password</label>
    <input type="password" name="old_password" required style="width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc;">
    
    <label>New Password</label>
    <input type="password" name="new_password" required style="width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc;">

    <label>Confirm New Password</label>
    <input type="password" name="confirm_password" required style="width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc;">
    
    <button type="submit" style="width:100%; padding:10px; background:#2c7be5; color:white; border:none; border-radius:4px;">Change Password</button>

</form>

{% endblock %}
