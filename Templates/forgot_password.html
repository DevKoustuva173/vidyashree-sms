{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center; margin-bottom:20px;">Forgot Password</h2>

{% if error %}
<p style="color:red; text-align:center;">{{ error }}</p>
{% endif %}

<form method="POST" style="width:300px; margin:20px auto;">
    <label>Username</label>
    <input type="text" name="username" required
    style="width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc;">
    
    <label>Security Answer</label>
    <input type="text" name="security_answer" required
    style="width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc;">

    <label>New Password</label>
    <input type="password" name="password" required
    style="width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc;">
    
    <button type="submit" style="width:100%; padding:10px; background:#2c7be5; color:white; border:none; border-radius:4px;">Reset Password</button>
</form>

<div style="text-align:center; margin-top:10px;">
    <a href="/" style="color:#2c7be5; text-decoration:none;">Back to Login</a>
</div>

{% endblock %}
